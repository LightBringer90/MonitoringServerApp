name: server-monitor-api

services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - ${MONITOR_ENV_FILE:-.env}
    ports:
      - "${MONITOR_APP_PORT:-7000}:7000"
    volumes:
      - ${MONITOR_DATA_DIR:-./data}:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - mailpit
    networks:
      - internal

  mailpit:
    image: axllent/mailpit:v1.21
    restart: unless-stopped
    ports:
      - "${MONITOR_MAILPIT_UI_PORT:-8025}:8025"
      - "${MONITOR_MAILPIT_SMTP_PORT:-1025}:1025"
    networks:
      - internal

networks:
  internal:
