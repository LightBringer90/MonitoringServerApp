name: server-monitor-api

services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "7000:7000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

networks:
  internal:
